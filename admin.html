<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reklamas Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.hidden { display:none; }
</style>
</head>

<body class="bg-yellow-50">

<!-- LOGIN -->
<div id="loginBox" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-white p-8 rounded-2xl w-full max-w-sm">
    <h2 class="text-2xl font-bold mb-4">Přihlášení</h2>

    <input id="password" type="password" placeholder="Heslo"
      class="w-full border p-3 rounded-xl mb-4">

    <button onclick="login()"
      class="w-full bg-yellow-400 p-3 rounded-xl font-bold">
      Přihlásit
    </button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden p-6 max-w-5xl mx-auto">

  <h1 class="text-3xl font-bold mb-6">Reklamas Admin</h1>

  <!-- FORM -->
  <div class="bg-white p-6 rounded-2xl mb-6">
    <h2 class="font-bold mb-4">Přidat zájemce</h2>

    <input id="name" placeholder="Jméno"
      class="w-full border p-2 rounded mb-2">

    <input id="city" placeholder="Město"
      class="w-full border p-2 rounded mb-2">

    <button onclick="addLead()"
      class="bg-yellow-400 px-4 py-2 rounded font-bold">
      Uložit
    </button>
  </div>

  <!-- LIST -->
  <div id="list"></div>

</div>

<script>
const PASSWORD = "1234"; // změň si

function login() {
  const val = document.getElementById("password").value;

  if (val === PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("admin").classList.remove("hidden");
    load();
  } else {
    alert("Špatné heslo");
  }
}

function addLead() {
  const name = document.getElementById("name").value;
  const city = document.getElementById("city").value;

  let data = JSON.parse(localStorage.getItem("leads") || "[]");

  data.push({ name, city });

  localStorage.setItem("leads", JSON.stringify(data));

  load();
}

function load() {
  let data = JSON.parse(localStorage.getItem("leads") || "[]");

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="bg-white p-4 rounded-xl mb-2">
        <b>${item.name}</b> – ${item.city}
      </div>
    `;
  });
}
</script>

</body>
</html>
